<head>
  <style>
    body {
      margin: 0;
      background-color: #d3d3d3;
    }
  </style>

  <script type="importmap">{ "imports": {
    "three": "https://esm.sh/three",
    "three/": "https://esm.sh/three/"
  }}</script>

  <!--  <script type="module"> import * as THREE from 'three'; window.THREE = THREE;</script>-->
  <!--  <script src="../../dist/three-globe.js" defer></script>-->
</head>

<body>
  <div id="globeViz"></div>

  <script type="module">
    import ThreeGlobe from 'https://esm.sh/three-globe?external=three';
    import * as THREE from 'https://esm.sh/three';
    import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js?external=three';
    import { BackSide, BufferAttribute, Color, Mesh, ShaderMaterial } from 'https://esm.sh/three';

    const normalOpacityCountries = [
      // Latin America
      "Brazil", "Argentina", "Mexico", "Chile", "Colombia", "Venezuela",
      "Peru", "Uruguay", "Ecuador", "Haiti", "Dominican Republic",
      "Panama", "Bolivia", "Costa Rica", "El Salvador", "Bahamas",
      "Jamaica", "Paraguay", "Guatemala", "Cuba", "Honduras", "Nicaragua", "Suriname", "Guyana", "Puerto Riko", "Dominican Rep.", "Trinidad and Tobago",
      // Africa
      "Algeria", "South Africa", "Morocco", "Nigeria", "Tunisia", "Mali",
      "Ivory Coast", "Democratic Republic of the Congo", "Cameroon",
      "Benin", "Senegal", "Togo", "Egypt", "Mauritius", "Burkina Faso",
      "Angola", "Ghana", "Mozambique", "Madagascar", "Liberia", "Zimbabwe",
      "Ethiopia", "Rwanda", "Botswana", "Gabon", "Malawi", "Namibia",
      "Uganda", "Kenya", "Niger", "Sudan", "Zambia", "Libya", "Sierra Leone", "Congo", "Chad", "Central African Rep.", "Tanzania", "Eritrea", "Djibouti", "Côte d'Ivoire", "Mauritania", "Lesotho", "eSwatini", "Burundi", "Guinea-Bissau", "Gambia",
      // Asia
      "Iran", "India", "Indonesia", "Thailand", "Vietnam", "Laos", "Myanmar", "Syria", "Oman", "Emirates", "Qatar",
      "Jordan", "Philippines", "Armenia", "Iraq", "Pakistan",
      "Kuwait", "Saudi Arabia", "Cambodia", "Malaysia", "Bangladesh",
      "Nepal", "Afghanistan", "Turkmenistan", "Sri Lanka",
      "Macedonia", "Yemen", "China", "Mongolia", "Taiwan", "Singapore", "Brunei", "Bhutan", "North Korea",
      // Oceania
      "Papua New Guinea", "Fiji", "Samoa", "Tonga", "Vanuatu", "Solomon Islands", "Timor-Leste",
      // Europe
      "Croatia", "Serbia", "Bosnia and Herzegovina","Cyprus"
    ];

    // Gray color for low-opacity countries
    const LOW_OPACITY_COLOR = '#3e3e3e';

    fetch('./ne_110m_admin_0_countries.geojson').then(res => res.json()).then(countries => {
      const palette = ['#FFFFD9', '#7FCDBB', '#41B6C4', '#02818A', '#456194', '#EDF8B1', '#C7E9B4'];
      // Build adjacency map: country index -> set of neighbor indices
      const features = countries.features;
      const adjacency = Array(features.length).fill(0).map(() => new Set());

      // Helper: check if two polygons share any coordinates (simple neighbor test)
      function polygonsTouch(coordsA, coordsB) {
        function flattenCoords(coords) {
          // Recursively flatten to array of [lng, lat] pairs
          let out = [];
          if (Array.isArray(coords[0])) {
            coords.forEach(c => out = out.concat(flattenCoords(c)));
          } else if (typeof coords[0] === 'number') {
            out.push(coords);
          }
          return out;
        }
        const flatA = flattenCoords(coordsA).map(pt => pt[0] + ',' + pt[1]);
        const flatB = flattenCoords(coordsB).map(pt => pt[0] + ',' + pt[1]);
        return flatA.some(pt => flatB.includes(pt));
      }

      // Build adjacency by comparing each pair (O(n^2), but ok for small n)
      for (let i = 0; i < features.length; i++) {
        for (let j = i + 1; j < features.length; j++) {
          if (polygonsTouch(features[i].geometry.coordinates, features[j].geometry.coordinates)) {
            adjacency[i].add(j);
            adjacency[j].add(i);
          }
        }
      }

      // Assign colors using greedy coloring
      for (let i = 0; i < features.length; i++) {
        // Find colors used by neighbors
        const neighborColors = new Set([...adjacency[i]].map(j => features[j].properties._color));
        // Assign the first available color
        const color = palette.find(c => !neighborColors.has(c)) || palette[0];
        features[i].properties._color = color;

        const countryName = features[i].properties.name || features[i].properties.NAME || features[i].properties.NAME_EN;
        // Check if this country should have normal opacity or be gray
        const hasNormalOpacity = normalOpacityCountries.some(normalCountry =>
          countryName.toLowerCase().includes(normalCountry.toLowerCase()) ||
          normalCountry.toLowerCase().includes(countryName.toLowerCase())
        );

        features[i].properties._isNormalOpacity = hasNormalOpacity;
      }


    const Globe = new ThreeGlobe()
      .hexPolygonsData(features)
      .showAtmosphere(true)// removes the halo effect 
      .atmosphereAltitude(0.3) // increases the size of the halo
      .atmosphereColor('#8C96C6')
      .hexPolygonResolution(3)
      .hexPolygonMargin(0.3)
      .hexPolygonUseDots(false)
      .hexPolygonColor(d => {
        // Return gray for low-opacity countries, original color for normal ones
        return d.properties._isNormalOpacity ? d.properties._color : LOW_OPACITY_COLOR;
      })
      .hexPolygonAltitude(d => 0.01);

    const originalColors = new Map();
      features.forEach((f, idx) => {
        originalColors.set(idx, f.properties._color);
      });

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();
      let hoveredHexIndex = null;

      function onMouseMove(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        
        const intersects = raycaster.intersectObject(Globe, true);
        
        if (intersects.length > 0) {
          let hexIndex = null;
          for (const intersect of intersects) {
            if (intersect.object.__data) {
              hexIndex = features.indexOf(intersect.object.__data);
              if (hexIndex !== -1) break;
            }
          }

        // Only process hover if it's a normal opacity country
        if (hexIndex !== null && hexIndex !== -1 && features[hexIndex].properties._isNormalOpacity) {
          if (hexIndex !== hoveredHexIndex) {
            // Reset previous hover (only if it was a normal opacity country)
            if (hoveredHexIndex !== null && hoveredHexIndex !== -1 && features[hoveredHexIndex].properties._isNormalOpacity) {
              features[hoveredHexIndex].properties._color = originalColors.get(hoveredHexIndex);
              Globe.hexPolygonsData(features);
            }

            // Apply new hover
            hoveredHexIndex = hexIndex;
            features[hexIndex].properties._color = '#88419D';
            Globe.hexPolygonsData(features);
          }
        } else {
          // Mouse is over a gray country or no country - reset any existing hover
          if (hoveredHexIndex !== null && hoveredHexIndex !== -1 && features[hoveredHexIndex].properties._isNormalOpacity) {
            features[hoveredHexIndex].properties._color = originalColors.get(hoveredHexIndex);
            hoveredHexIndex = null;
            Globe.hexPolygonsData(features);
          }
        }
      } else if (hoveredHexIndex !== null && hoveredHexIndex !== -1 && features[hoveredHexIndex].properties._isNormalOpacity) {
        // Mouse moved away - reset hover
        features[hoveredHexIndex].properties._color = originalColors.get(hoveredHexIndex);
        hoveredHexIndex = null;
        Globe.hexPolygonsData(features);
      }
    }

    const renderer = new THREE.WebGLRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
    document.getElementById('globeViz').appendChild(renderer.domElement);

    renderer.domElement.addEventListener('mousemove', onMouseMove);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2D2D44);

    // Add starfield
    const starsGeometry = new THREE.BufferGeometry();
    const starCount = 5000;
    const positions = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount * 3; i += 3) {
      const radius = 500 + Math.random() * 500;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);

      positions[i] = radius * Math.sin(phi) * Math.cos(theta);
      positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta);
      positions[i + 2] = radius * Math.cos(phi);
    }

    starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const starsMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 1.5,
      sizeAttenuation: true
    });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    scene.add(Globe);
    scene.add(new THREE.AmbientLight(0xcccccc, Math.PI));
    scene.add(new THREE.DirectionalLight(0x49496E, 0.6 * Math.PI));

    // Add a globe base layer with background color
    const globeGeometry = new THREE.SphereGeometry(101, 40, 40);
    const globeMaterial = new THREE.MeshPhongMaterial({ color: 0x202031 });
    const globeBase = new THREE.Mesh(globeGeometry, globeMaterial);
    scene.add(globeBase);

    // Setup camera
    const camera = new THREE.PerspectiveCamera();
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    camera.position.z = 300;

    // Add camera controls (OrbitControls with constrained vertical tilt)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.minDistance = 200;
    controls.maxDistance = 800;
    controls.enablePan = false;
    controls.rotateSpeed = 1.5;
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    const tiltLimit = Math.PI / 6;
    controls.minPolarAngle = Math.PI / 2 - tiltLimit;
    controls.maxPolarAngle = Math.PI / 2 + tiltLimit;
    camera.position.set(0, 0, 300);
    controls.target.set(0, 0, 0);
    controls.update();

    // Kick-off renderer
    (function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    })();
  });
  </script>
</body>
